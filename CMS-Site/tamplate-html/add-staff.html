<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tastoria CMS — Add Staff</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="cms-style.css">
</head>
<body class="cms-page">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <span class="logo">Tastoria</span>
            <span class="brand-tag">CMS</span>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <span class="nav-icon">🍜</span> Cuisines
            </a>
            <a href="categories.html" class="nav-item">
                <span class="nav-icon">🏷️</span> Categories
            </a>
            <a href="add-staff.html" class="nav-item active">
                <span class="nav-icon">👤</span> Add Staff
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar">A</div>
                <div>
                    <div class="user-name" id="sidebarUserName">Admin</div>
                    <div class="user-role" id="sidebarUserRole">Admin</div>
                </div>
            </div>
            <button class="btn-logout" id="logoutBtn">Logout</button>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="cms-main">
        <div class="cms-header">
            <div>
                <h1 class="cms-title">Add Staff</h1>
                <p class="cms-subtitle">Register a new staff member</p>
            </div>
        </div>

        <div id="alertBox" class="alert hidden"></div>

        <div class="form-card">
            <form id="addStaffForm">
                <div class="form-group">
                    <label for="staffUsername">Username</label>
                    <input type="text" id="staffUsername" placeholder="e.g. john_doe" />
                </div>
                <div class="form-group">
                    <label for="staffEmail">Email</label>
                    <input type="email" id="staffEmail" placeholder="staff@tastoria.com" required />
                </div>
                <div class="form-group">
                    <label for="staffPassword">Password</label>
                    <input type="password" id="staffPassword" placeholder="Min. 5 characters" required />
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Add Staff</button>
                </div>
            </form>
        </div>
    </main>

</body>
</html>
